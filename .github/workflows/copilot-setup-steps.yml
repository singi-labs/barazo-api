name: 'Copilot Setup Steps'

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: barazo
          POSTGRES_PASSWORD: barazo_dev
          POSTGRES_DB: barazo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U barazo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - name: Clone and build barazo-lexicons
        run: |
          git clone --depth 1 https://github.com/singi-labs/barazo-lexicons.git ../barazo-lexicons
          cd ../barazo-lexicons && pnpm install --ignore-scripts && pnpm run build
      - run: pnpm install
      - run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://barazo:barazo_dev@localhost:5432/barazo
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://barazo:barazo_dev@localhost:5432/barazo
          VALKEY_URL: redis://localhost:6379
          TAP_URL: http://localhost:2480
          TAP_ADMIN_PASSWORD: tap_dev_secret
